name: Refresh Alpha Signals

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        offset: [0, 100, 200, 300]
    steps:
      - name: Refresh batch
        run: |
          curl --fail --show-error --silent \
            "https://alpha-rightside-monitor.pages.dev/api/refresh?key=${{ secrets.CRON_SECRET }}&offset=${{ matrix.offset }}&limit=100" \
            | jq '{ok, checkedAt, offset, limit, activeTotal, processed, metricsWritten, errors: (.errors | length)}'
