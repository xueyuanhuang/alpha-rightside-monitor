name: Refresh Alpha Signals

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        offset: [0, 50, 100, 150, 200, 250, 300, 350]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Refresh batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WALLET_KLINE_LIMIT: "330"
        run: |
          node scripts/refresh-live.mjs --offset "${{ matrix.offset }}" --limit 50 --kline-limit 330 \
            | jq '{ok, checkedAt, offset, limit, activeTotal, processed, metricsWritten, errors: (.errors | length)}'
